<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Museum Ovartaci - Quiz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gotu&family=Jua&family=Yrsa:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container-ipad">
      <div class="hvid-boks">
        <div id="start-skaerm" class="skaerm-sektion">
          <h1>Hvem minder <span class="du">du</span> om?</h1>
          <div class="undertekst">
            <p>
              Tag quizzen og find ud af hvilken af Ovartacis dukker, du minder
              mest om.
            </p>
          </div>
          <img src="img/forside.gif" alt="forside gif" class="forside-gif" />
          <button class="start-knap" onclick="startQuiz()">Start Quiz</button>
          <img src="img/haand.png" alt="haand" class="haand" />
        </div>

        <div id="quiz-skaerm" class="skaerm-sektion" style="display: none">
          <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
          </div>

          <h2 id="spg-tekst">Spørgsmål</h2>

          <div id="svar-knap-container"></div>

          <button class="tilbage-knap" onclick="goBackToStart()">
            Tilbage til forsiden
          </button>
        </div>

        <div id="result-skaerm" class="skaerm-sektion" style="display: none">
          <h1>Du minder mest om...</h1>
          <h2 id="dukke-navn" class="du">Dukkens navn</h2>
          <div class="undertekst">
            <p id="dukke-beskrivelse">Beskrivelse af dukke</p>
          </div>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
